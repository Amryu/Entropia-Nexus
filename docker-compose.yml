volumes:
  common_data:
  nexus-bot-config:
  nexus-uploads:
services:
  api:
    build: ./api
    container_name: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: ${API_ENV_PATH:-./api/.env}
        target: /app/.env
        read_only: true
    networks:
      - backend
      - frontend

  nexus:
    build: ./nexus
    container_name: nexus
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - type: bind
        source: ${COMMON_HOST_PATH:-./common}
        target: /app/src/lib/common
        read_only: true
      - type: bind
        source: ${NEXUS_ENV_PATH:-./nexus/.env}
        target: /app/.env
        read_only: true
      # Persistent storage for uploaded images
      - type: volume
        source: nexus-uploads
        target: /app/uploads
    environment:
      - UPLOAD_DIR=/app/uploads
    networks:
      - backend
      - frontend

  nexus-bot:
    build: ./nexus-bot
    container_name: nexus-bot
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${COMMON_HOST_PATH:-./common}
        target: /app/common
        read_only: true
      - type: bind
        source: ${BOT_ENV_PATH:-./nexus-bot/.env}
        target: /app/.env
        read_only: true
      - type: bind
        source: ${BOT_CONFIG_PATH:-./nexus-bot/config.json}
        target: /app/config.json
        read_only: false
    networks:
      - backend

networks:
  backend:
    external: true
  frontend:
    external: true