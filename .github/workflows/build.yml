name: build

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            nexus/package-lock.json

      - name: Install Nexus dependencies (with dev)
        working-directory: nexus
        run: npm ci

      - name: Build Nexus app (production)
        working-directory: nexus
        run: npm run build:prod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images (GHCR)
        env:
          REGISTRY: ghcr.io
          IMAGE_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$IMAGE_OWNER/entropia-nexus-api:$IMAGE_TAG ./api
          docker build -t $REGISTRY/$IMAGE_OWNER/entropia-nexus-nexus:$IMAGE_TAG ./nexus
          docker build -t $REGISTRY/$IMAGE_OWNER/entropia-nexus-bot:$IMAGE_TAG ./nexus-bot
          docker push $REGISTRY/$IMAGE_OWNER/entropia-nexus-api:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_OWNER/entropia-nexus-nexus:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_OWNER/entropia-nexus-bot:$IMAGE_TAG

      - name: Upload common folder as artifact (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: common-folder
          path: common/**
